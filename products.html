<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Clik-Cart</title>
</head>
<body>
    <section class="products">
    <input type="text" placeholder="Search products..." class="search-bar">

    <div class="product-container">

        <div class="product-card">
            <img src="https://via.placeholder.com/300x250" alt="Laptop">
            <div class="product-info">
                <h3>Laptop</h3>
                <p>High-performance laptop for work and gaming.</p>
                <div class="price">$599</div>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x250" alt="Smartphone">
            <div class="product-info">
                <h3>Smartphone</h3>
                <p>Latest smartphone with advanced camera.</p>
                <div class="price">$499</div>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x250" alt="Headphones">
            <div class="product-info">
                <h3>Wireless Headphones</h3>
                <p>Noise-cancelling premium sound quality.</p>
                <div class="price">$349</div>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x250" alt="Watch">
            <div class="product-info">
                <h3>Smart Watch</h3>
                <p>Track fitness and notifications on the go.</p>
                <div class="price">$499</div>
                <button class="btn">Add to Cart</button>
            </div>
        </div>

    </div>
</section>
</body>
</html>
